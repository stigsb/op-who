name: Release (notarized)

# Runs on every `v*` tag push: builds, hardened-runtime signs (Developer ID
# Application), notarizes + staples the .app, builds the notarized .pkg
# (Developer ID Installer), publishes the GitHub Release with both artifacts,
# and updates the stigsb/homebrew-tap cask. Requires these Actions secrets:
# DEVELOPER_ID_CERTIFICATE_P12 (+ _PASSWORD), DEVELOPER_ID_INSTALLER_P12
# (+ _PASSWORD), NOTARY_APPLE_ID, NOTARY_PASSWORD, NOTARY_TEAM_ID, and
# TAP_GITHUB_TOKEN. workflow_dispatch is kept for manual re-runs/testing.
#
# The signing/notary/tap secrets live in the `release` GitHub Environment,
# whose deployment policy only permits the `v*` tag and the `main` branch —
# so a pull request (from a fork or a branch) can never run with them.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    # Gates the secrets below to the v*-tag / main refs allowed by the
    # environment's deployment-branch policy.
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: swift build -c release

      - name: Assemble .app bundle
        run: |
          APP_DIR=".build/op-who.app"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS"
          cp .build/release/op-who "$APP_DIR/Contents/MacOS/"
          cp Sources/OpWhoLib/Info.plist "$APP_DIR/Contents/"

          # Stamp version from tag into Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" "$APP_DIR/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" "$APP_DIR/Contents/Info.plist"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          INSTALLER_P12: ${{ secrets.DEVELOPER_ID_INSTALLER_P12 }}
          INSTALLER_PASSWORD: ${{ secrets.DEVELOPER_ID_INSTALLER_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import Developer ID Application cert (signs op-who.app)
          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Import Developer ID Installer cert (signs the .pkg)
          echo "$INSTALLER_P12" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/installer.p12" \
            -P "$INSTALLER_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign with hardened runtime
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/signing.keychain-db" \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')

          codesign --deep --force --options runtime \
            --entitlements release.entitlements \
            --sign "$IDENTITY" \
            .build/op-who.app

          codesign --verify --deep --verbose=2 .build/op-who.app

      - name: Package
        run: ditto -c -k --keepParent .build/op-who.app .build/op-who.zip

      - name: Notarize
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          xcrun notarytool submit .build/op-who.zip \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait

          xcrun stapler staple .build/op-who.app

          # Re-zip with stapled ticket
          rm .build/op-who.zip
          ditto -c -k --keepParent .build/op-who.app .build/op-who.zip

      - name: Build Fleet installer pkg
        # Signed with the Developer ID Installer cert imported above; notarized
        # via the NOTARY_* env creds (build-pkg.sh prefers them over a profile).
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: scripts/build-pkg.sh

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 .build/op-who.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          TAG="$GITHUB_REF_NAME"
          # Auto-generated change notes, with the default "## What's Changed"
          # heading renamed to "## Changes".
          AUTO=$(gh api --method POST "/repos/${REPO}/releases/generate-notes" \
              -f tag_name="$TAG" --jq '.body' | sed '1s/^## .*/## Changes/')
          # Compose: ## Install (static template, placeholders filled) + changes.
          BODY_FILE="$RUNNER_TEMP/body.md"
          sed -e "s|__REPO__|${REPO}|g" -e "s|__TAG__|${TAG}|g" \
              .github/release-install-template.md > "$BODY_FILE"
          printf '\n%s\n' "$AUTO" >> "$BODY_FILE"
          echo "body_file=$BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            .build/op-who.zip \
            ".build/op-who-${{ steps.version.outputs.version }}.pkg" \
            --title "op-who ${{ steps.version.outputs.version }}" \
            --notes-file "${{ steps.notes.outputs.body_file }}"

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/stigsb/homebrew-tap.git" "$RUNNER_TEMP/tap"
          cd "$RUNNER_TEMP/tap"

          mkdir -p Casks
          cat > Casks/op-who.rb << CASK
          cask "op-who" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/stigsb/op-who/releases/download/v#{version}/op-who.zip"
            name "op-who"
            desc "Shows which process triggered a 1Password approval dialog"
            homepage "https://github.com/stigsb/op-who"

            app "op-who.app"

            zap trash: [
              "~/Library/Preferences/com.stigbakken.op-who.plist",
            ]
          end
          CASK

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/op-who.rb
          git commit -m "Update op-who to ${VERSION}"
          git push
