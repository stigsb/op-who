name: Release

# Opens a draft GitHub Release on every `v*` tag push. The body is composed
# from .github/release-install-template.md (the static `## Install` section)
# plus auto-generated PR/commit notes (re-headed as `## Changes`).
#
# Artifacts are uploaded from a maintainer's Mac via `scripts/upload-dev.sh`
# after running `scripts/package-dev.sh` (the build needs a local signing
# identity that isn't reachable from GitHub-hosted runners).
#
# When the notarized pipeline takes over, either repurpose this workflow or
# remove it and re-enable release-notarized.yml's tag trigger.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="$GITHUB_REF_NAME"

          # Auto-generated change notes from the GitHub API, with its default
          # "## What's Changed" heading renamed to "## Changes".
          AUTO=$(gh api \
              --method POST \
              "/repos/${REPO}/releases/generate-notes" \
              -f tag_name="$TAG" \
              --jq '.body' \
            | sed '1s/^## .*/## Changes/')

          # Compose final body: ## Install (static template, with REPO/TAG
          # placeholders filled in) + the change notes.
          BODY_FILE=$(mktemp)
          sed -e "s|__REPO__|${REPO}|g" -e "s|__TAG__|${TAG}|g" \
              .github/release-install-template.md > "$BODY_FILE"
          printf '\n%s\n' "$AUTO" >> "$BODY_FILE"

          gh release create "$TAG" \
            --draft \
            --title "op-who $VERSION" \
            --notes-file "$BODY_FILE"
