name: Release

# Opens a draft GitHub Release on every `v*` tag push. Artifacts are uploaded
# manually after running `scripts/package-dev.sh` (e.g. via `gh release upload
# vX.Y.Z dist/*`).
#
# When the notarized pipeline takes over, either repurpose this workflow or
# remove it and re-enable release-notarized.yml's tag trigger.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "op-who $VERSION" \
            --generate-notes
